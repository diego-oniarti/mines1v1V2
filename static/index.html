<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Mines1v1</title>
        <link href="css/style.css" rel="stylesheet">
        <script type="text/javascript" src="scripts/createLobbyForm.js"></script>
    </head>
    <body>
        <fieldset>
            <legend>Join Game</legend>
            <form action="/game.html" method="get">
                <input name="lobby" value="" placeholder="lobby id">
                <input type="submit" name="submit" value="Join">
            </form>
        </fieldset>

        <fieldset>
            <legend>Create Lobby</legend>
            <form onsubmit="return createLobby(this)">
                <select name="mode">
                    <option value="singleplayer">singleplayer</option>
                    <option value="1v1" selected>1v1</option>
                </select> <br>
                <input type="checkbox" name="timed" checked> <br>
                <input type="number" name="time" value="3000">ms <br>
                <input type="number" name="width" value="16"> x 
                <input type="number" name="height" value="16"> <br>
                <input type="number" name="bombs" value="40"> <br>
                <input type="submit" value="Create">
            </form>
        </fieldset>
    </body>
</html>
