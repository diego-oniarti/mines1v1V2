<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mines1v1 - Match</title>
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="scripts/game1v1.js"></script>
    
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text-dim: #94a3b8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; /* Prevents scrollbars if the canvas is large */
            display: flex;
            flex-direction: column;
        }

        /* Top Bar for Game Info */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        .info-pill {
            background: var(--bg);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #gameKey {
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: bold;
        }

        /* The Centering Magic */
        #game {
            flex-grow: 1; /* Take up remaining height */
            display: flex;
            align-items: center;    /* Vertical center */
            justify-content: center; /* Horizontal center */
            padding: 20px;
            box-sizing: border-box;
        }

        /* Target the canvas p5 creates */
        canvas {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            max-width: 100%;
            max-height: 100%;
        }

        /* Simple Back Button (Optional but handy) */
        .back-btn {
            position: absolute;
            left: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        
        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="back-btn">← LEAVE</a>
        <div class="info-pill">
            <span class="label">Lobby Key</span>
            <span id="gameKey"></span>
        </div>
    </header>

    <div id="game">
        </div>

</body>
</html>
